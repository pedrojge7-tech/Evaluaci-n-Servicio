<style>
:root{
  --if-navy:       #152130;
  --if-navy-mid:   #1E3347;
  --if-navy-light: #2C4560;
  --if-orange:     #E07010;
  --if-orange-hover: #C86008;
  --if-orange-light: #F4921E;
  --if-white:      #F8FAFB;
  --if-gray-100:   #EDF1F5;
  --if-gray-300:   #B8C4CE;
  --if-gray-500:   #7A8D9E;
  --bg: var(--if-gray-100); 
  --surface: #FFFFFF; 
  --surface2: var(--if-white); 
  --border: rgba(184, 196, 206, 0.4); 
  --text: var(--if-navy); 
  --muted: var(--if-gray-500); 
  --primary: var(--if-orange); 
  --primary-hover: var(--if-orange-hover); 
  --primary-light: rgba(224, 112, 16, 0.06); 
  --success: #10B981; 
  --success-bg: #D1FAE5;
  --warning: #F59E0B;
  --warning-bg: #FEF3C7;
  --danger: #EF4444;
  --danger-bg: #FEE2E2;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --shadow: 0 4px 6px -1px rgba(21, 33, 48, 0.05), 0 2px 4px -1px rgba(21, 33, 48, 0.03);
  --shadow-md: 0 12px 25px -5px rgba(21, 33, 48, 0.08), 0 8px 10px -6px rgba(21, 33, 48, 0.04);
  --r: 20px; --rs: 12px;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing: antialiased;}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;background:rgba(237, 241, 245, 0.95);backdrop-filter:blur(8px);z-index:9999;display:var(--login-display, flex);align-items:center;justify-content:center;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:48px 40px;width:380px;box-shadow:var(--shadow-md);text-align:center;}
.login-input{width:100%;border:1.5px solid var(--border);border-radius:var(--rs);padding:12px 16px;font-family:var(--font);font-size:.95rem;outline:none;margin-bottom:16px;transition:all .2s; color: var(--text); background: var(--surface2);}
.login-btn{width:100%;background:var(--primary);color:#fff;border:none;padding:14px;border-radius:var(--rs);font-family:var(--font);font-weight:600;font-size:.95rem;cursor:pointer;transition:all .2s;}
.login-btn:hover{background:var(--primary-hover); transform: translateY(-1px);}

/* ── HEADER & LOGOS ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.header-left{display: flex; align-items: center; gap: 16px;}
.header-logo-upload { height: 45px; min-width: 45px; max-width: 220px; display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; transition: 0.2s;}
.custom-logo-img { height: 45px !important; width: auto !important; max-width: 220px !important; object-fit: contain !important; display: block; }
#defaultLogoLeft { width: 45px; height: 45px; background: var(--if-orange); color: #fff; font-weight: 900; font-size: 20px; display: flex; align-items: center; justify-content: center; border-radius: 6px;}

.header-left h1{font-weight:800;font-size:1.25rem;letter-spacing:-0.03em;}
.header-right{display:flex;align-items:center;gap:12px;}
.btn{border:none;padding:10px 20px;border-radius:50px;font-size:.8rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;}
.btn-import{background:var(--surface);color:var(--text);border:1.5px solid var(--border);}
.btn-share{background:var(--if-navy);color:#fff;}

/* ── FILTERS ── */
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 24px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;box-shadow:var(--shadow);}
.filter-label{font-weight:700;font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:8px;min-width:160px;}
#filterBarDept { flex-direction: column; max-height: 400px; overflow-y: auto; }
.filter-dir-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; padding: 12px 16px; background: var(--surface2); border-radius: var(--rs); width: 100%; margin-bottom: 8px;}
.filter-dir-group-title { font-weight:700; font-size: .68rem; color: var(--if-navy-light); text-transform: uppercase; min-width: 90px; }
.filter-chip{padding:8px 16px;border-radius:50px;border:1.5px solid var(--border);background:var(--surface);font-family:var(--font);font-weight:600;font-size:.78rem;color:var(--muted);cursor:pointer;transition:all .2s;}
.filter-chip.active{background:var(--if-navy);color:#fff;border-color:var(--if-navy);}

/* ── TABLES ── */
.table-card {background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;box-shadow:var(--shadow);margin-bottom:24px; overflow: hidden;}
.table-wrapper { width: 100%; overflow-x: auto; border-radius: var(--rs); }
table {width:100%; border-collapse:separate; border-spacing:0; font-size:.85rem;}
.fixed-col { position: sticky !important; left: 0; z-index: 10 !important; background: var(--surface) !important; border-right: 3px solid #CBD5E1 !important;}
thead .fixed-col { background: var(--surface2) !important; z-index: 11 !important; }
th, td { padding: 12px 16px; text-align: center; border-bottom: 1px solid var(--if-gray-100); }
.q-cell { text-align: left; min-width: 280px; font-weight: 600; }

/* Estilo para Fila Total General */
.row-total-general td { background: #152130 !important; color: #ffffff !important; font-weight: 800 !important; border: none !important; }

/* ── CHARTS & RANKING ── */
.charts-row{display:grid;grid-template-columns:repeat(auto-fit, minmax(400px, 1fr));gap:24px;margin-bottom:24px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;box-shadow:var(--shadow); display:flex; flex-direction:column;}
.chart-container{flex:1; min-height: 300px; position: relative;}

/* ── COMMENTS ── */
.dept-tab{padding:10px 18px;border-radius:50px;border:1.5px solid var(--border);background:var(--surface);font-weight:600;font-size:.8rem;cursor:pointer;margin-right:8px;margin-bottom:8px; transition: 0.2s;}
.dept-tab.active{background:var(--if-navy);color:#fff;}
.comment-item{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:var(--rs);padding:16px;margin-bottom:12px;font-size:.85rem;line-height:1.5;}

@media print {
  .header, #loginScreen, .filter-bar, .insight-container { display: none !important; }
  .main { padding: 0 !important; }
  .row-total-general td { background: #152130 !important; -webkit-print-color-adjust: exact; }
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="brand-logo-if" style="width:50px; height:50px; font-size:20px;">IF</div>
    <h2 style="margin: 15px 0 5px;">Acceso Admin</h2>
    <p style="font-size:13px; color:var(--muted); margin-bottom:20px;">Ingresa tus credenciales de editor.</p>
    <input class="login-input" type="email" id="loginEmail" placeholder="Correo electrónico">
    <input class="login-input" type="password" id="loginPwd" placeholder="Contraseña">
    <div id="loginErr" style="color:var(--danger); font-size:12px; margin-bottom:10px; display:none;">Datos incorrectos.</div>
    <button class="login-btn" id="loginBtn">Ingresar</button>
  </div>
</div>

<header class="header">
  <div class="header-left">
    <div class="header-logo-upload" id="logoLeftBox">
      <img id="logoLeftImg" class="custom-logo-img" style="display:none;"> 
      <div id="defaultLogoLeft">IF</div>
    </div>
    <div>
      <h1 id="dashTitle">Evaluación de Servicio</h1>
      <p id="dashSubtitle" style="font-size:11px; color:var(--muted);"></p>
    </div>
  </div>
  <div class="header-right">
    <button class="btn btn-import" id="btnImport">Importar Excel</button>
    <button class="btn btn-share" id="btnShare">Generar Modo Lector</button>
    <div class="header-logo-upload" id="logoRightBox" style="border: 1px dashed var(--if-gray-300);">
      <img id="logoRightImg" class="custom-logo-img" style="display:none;"> 
      <span id="defaultLogoRight" style="font-size:10px; color:var(--muted);">+ Logo</span>
    </div>
  </div>
</header>

<main class="main" style="padding: 20px 40px;">
  <div class="filter-bar" id="filterBarDir"></div>
  <div class="filter-bar" id="filterBarDept"></div>

  <div class="table-card" id="participationCard" style="display:none;">
    <h3 style="margin-bottom:15px; font-size:1.1rem;">Tasa de Participación</h3>
    <div class="table-wrapper"><table id="participationTable"></table></div>
  </div>

  <div class="charts-row">
    <div class="chart-card"><div class="chart-container"><canvas id="barChart"></canvas></div></div>
    <div class="chart-card"><div class="chart-container"><canvas id="radarChart"></canvas></div></div>
  </div>

  <div class="table-card">
    <h3 style="margin-bottom:15px; font-size:1.1rem;">Resultados Detallados</h3>
    <div class="table-wrapper"><table id="detailTable"><thead></thead><tbody></tbody></table></div>
  </div>

  <div class="chart-card">
    <h3 style="margin-bottom:15px; font-size:1.1rem;">Comentarios y Retroalimentación</h3>
    <div id="deptTabs" style="margin-bottom:15px;"></div>
    <div id="commentList"></div>
  </div>
</main>

<div id="importModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#fff; padding:30px; border-radius:15px; width:400px; text-align:center;">
        <h3>Subir Archivo</h3>
        <input type="file" id="fileInput" accept=".xlsx,.xls" style="margin:20px 0;">
        <button class="btn btn-share" style="width:100%; justify-content:center;" onclick="document.getElementById('importModal').style.display='none'">Cerrar</button>
    </div>
</div>

<script>
let DIRS = [], DEPTS = [], DEPT_TO_DIR = {}, QUESTIONS = [], SCORES = [], AVERAGES = [], COMMENTS = {}, PARTICIPATION = {};
let activeDirs = new Set(['Todas']), activeDepts = new Set(['Todos']);
let barChart, radarChart;

// --- CONFIGURACION FIREBASE ---
async function doLogin(){
    const email = document.getElementById('loginEmail').value;
    const pwd = document.getElementById('loginPwd').value;
    try {
        await firebase.auth().signInWithEmailAndPassword(email, pwd);
        document.getElementById('loginScreen').style.display = 'none';
        initDashboard();
    } catch(e) { document.getElementById('loginErr').style.display = 'block'; }
}

function handleFile(file){
    const reader = new FileReader();
    reader.onload = e => {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const s1 = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
        
        const hDir = s1[0] || [], hDept = s1[1] || [];
        let curDir = "", newDepts = [], newDirs = new Set(), newMap = {}, vCols = [];
        
        // Lector estricto de columnas B en adelante (c=1)
        for(let c=1; c<hDept.length; c++){
            if(hDir[c]) curDir = String(hDir[c]).trim();
            if(!curDir) continue;

            let rawName = hDept[c] ? String(hDept[c]).trim() : "";
            if(rawName){
                // Evitar duplicados para que Culiacan no desaparezca
                let uniqueName = rawName;
                if(newDepts.includes(uniqueName)) uniqueName = `${rawName} (${curDir})`;
                
                newDepts.push(uniqueName);
                newMap[uniqueName] = curDir;
                newDirs.add(curDir);
                vCols.push({c, d: uniqueName});
            }
        }

        const nQ = [], nSc = [];
        for(let r=2; r<s1.length; r++){
            const row = s1[r]; if(!row || !row[0]) continue;
            nQ.push(row[0]);
            nSc.push(vCols.map(vc => {
                let v = parseFloat(row[vc.c]);
                return isNaN(v) ? 0 : (v <= 1 ? v*10 : v);
            }));
        }

        // Comentarios (Hoja 2)
        const nComm = {}; newDepts.forEach(d => nComm[d] = []);
        if(wb.SheetNames[1]){
            const s2 = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[1]], {header:1});
            const h2 = s2[1] || [];
            for(let r=2; r<s2.length; r++){
                const row = s2[r]; if(!row) continue;
                for(let c=0; c<h2.length; c++){
                    if(row[c]){
                        let d = String(h2[c]).trim();
                        // Mapeo inteligente al nombre único
                        let target = newDepts.find(x => x === d || x.startsWith(d + " ("));
                        if(target) nComm[target].push(row[c]);
                    }
                }
            }
        }

        DIRS = Array.from(newDirs); DEPTS = newDepts; DEPT_TO_DIR = newMap; QUESTIONS = nQ; SCORES = nSc; COMMENTS = nComm;
        AVERAGES = DEPTS.map((_, di) => {
            let sum = 0; SCORES.forEach(q => sum += q[di]);
            return +(sum/QUESTIONS.length).toFixed(2);
        });
        updateSubtitle(); buildFilters(); updateAllViews();
    };
    reader.readAsArrayBuffer(file);
}

function buildFilters(){
    const fDir = document.getElementById('filterBarDir');
    fDir.innerHTML = '<span class="filter-label">Dirección:</span>';
    ['Todas', ...DIRS].forEach(d => {
        const btn = document.createElement('button');
        btn.className = 'filter-chip ' + (activeDirs.has(d) ? 'active' : '');
        btn.textContent = d;
        btn.onclick = () => {
            if(d==='Todas') activeDirs = new Set(['Todas']);
            else { activeDirs.delete('Todas'); if(activeDirs.has(d)) activeDirs.delete(d); else activeDirs.add(d); }
            if(!activeDirs.size) activeDirs.add('Todas');
            activeDepts = new Set(['Todos']);
            buildFilters(); updateAllViews();
        };
        fDir.appendChild(btn);
    });

    const fDept = document.getElementById('filterBarDept');
    fDept.innerHTML = '<span class="filter-label">Entidad:</span>';
    const allowedDirs = activeDirs.has('Todas') ? DIRS : Array.from(activeDirs);
    
    allowedDirs.forEach(dir => {
        const group = document.createElement('div');
        group.className = 'filter-dir-group';
        group.innerHTML = `<span class="filter-dir-group-title">${dir}</span>`;
        DEPTS.forEach(d => {
            if(DEPT_TO_DIR[d] === dir){
                const btn = document.createElement('button');
                btn.className = 'filter-chip ' + (activeDepts.has(d) ? 'active' : '');
                btn.textContent = d.split(' (')[0]; // Mostrar nombre limpio
                btn.onclick = () => {
                    activeDepts.delete('Todos');
                    if(activeDepts.has(d)) activeDepts.delete(d); else activeDepts.add(d);
                    if(!activeDepts.size) activeDepts.add('Todos');
                    buildFilters(); updateAllViews();
                };
                group.appendChild(btn);
            }
        });
        fDept.appendChild(group);
    });
}

function updateAllViews(){
    const allowedDirs = activeDirs.has('Todas') ? DIRS : Array.from(activeDirs);
    const filtered = DEPTS.filter(d => allowedDirs.includes(DEPT_TO_DIR[d]) && (activeDepts.has('Todos') || activeDepts.has(d)));
    
    renderBar(filtered);
    renderRadar(filtered);
    renderTable(filtered);
    renderComments(filtered);
}

function renderTable(depts){
    const thead = document.querySelector('#detailTable thead');
    const tbody = document.querySelector('#detailTable tbody');
    
    let h = `<tr><th class="fixed-col">Pregunta</th>${depts.map(d => `<th>${d.split(' (')[0]}</th>`).join('')}<th>Promedio</th></tr>`;
    thead.innerHTML = h;

    let b = QUESTIONS.map((q, qi) => {
        let rowScores = depts.map(d => SCORES[qi][DEPTS.indexOf(d)]);
        let rowAvg = (rowScores.reduce((a,b)=>a+b,0)/rowScores.length).toFixed(2);
        return `<tr><td class="fixed-col q-cell">${q}</td>${rowScores.map(s => `<td>${s.toFixed(1)}</td>`).join('')}<td><b>${rowAvg}</b></td></tr>`;
    }).join('');

    // Fila Total
    let globalAvg = (depts.reduce((a,b) => a + AVERAGES[DEPTS.indexOf(b)], 0) / depts.length).toFixed(2);
    b += `<tr class="row-total-general"><td class="fixed-col q-cell">TOTAL GENERAL</td>${depts.map(d => `<td>${AVERAGES[DEPTS.indexOf(d)].toFixed(2)}</td>`).join('')}<td>${globalAvg}</td></tr>`;
    
    tbody.innerHTML = b;
}

function renderComments(depts){
    const tabs = document.getElementById('deptTabs');
    const list = document.getElementById('commentList');
    tabs.innerHTML = '';
    
    depts.forEach(d => {
        const btn = document.createElement('button');
        btn.className = 'dept-tab';
        btn.textContent = d.split(' (')[0];
        btn.onclick = () => {
            document.querySelectorAll('.dept-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            list.innerHTML = COMMENTS[d].map(c => `<div class="comment-item">${c}</div>`).join('') || 'Sin comentarios.';
        };
        tabs.appendChild(btn);
    });
    if(depts[0]) tabs.firstChild.click();
}

function renderBar(depts){
    const ctx = document.getElementById('barChart');
    if(barChart) barChart.destroy();
    barChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: depts.map(d => d.split(' (')[0]),
            datasets: [{ label: 'Promedio General', data: depts.map(d => AVERAGES[DEPTS.indexOf(d)]), backgroundColor: '#E07010' }]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { min:0, max:10 } } }
    });
}

function renderRadar(depts){
    const ctx = document.getElementById('radarChart');
    if(radarChart) radarChart.destroy();
    radarChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: QUESTIONS.map((_,i) => 'P'+(i+1)),
            datasets: depts.map((d,i) => ({
                label: d.split(' (')[0],
                data: QUESTIONS.map((_, qi) => SCORES[qi][DEPTS.indexOf(d)]),
                borderColor: ['#152130','#E07010','#2C4560','#F4921E'][i%4]
            }))
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

function updateSubtitle(){
    document.getElementById('dashSubtitle').textContent = `${DEPTS.length} Entidades · ${DIRS.length} Direcciones · ${QUESTIONS.length} Preguntas`;
}

function initDashboard(){
    document.getElementById('btnImport').onclick = () => document.getElementById('importModal').style.display='flex';
    document.getElementById('fileInput').onchange = e => handleFile(e.target.files[0]);
    document.getElementById('loginBtn').onclick = doLogin;
}

// Iniciar
(async () => {
    while(!window.db) { await new Promise(r => setTimeout(r, 100)); }
    initDashboard();
})();
</script>
</body>
